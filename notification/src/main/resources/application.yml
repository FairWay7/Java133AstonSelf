spring:
  application:
    name: notification-service

  mail:
    host: smtp.gmail.com
    port: 587
    username: test
    password: test
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8089 #8089

kafka:
  topic: t.notification
  consumer:
    group-id: my-group

from:
  email: example@gmail.com

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true